# Example nginx reverse proxy for EconomyManager.
# Copy to e.g. /etc/nginx/sites-available/economymanager and adjust server_name, TLS paths, and ports.
#
# Prerequisites:
#   - API listens on 127.0.0.1:3001 (APP_PORT in .env; default 3001).
#   - Frontend built: `npm run build -w frontend` — static files from frontend/dist.
#   - CORS_ORIGIN in backend .env should include your public site origin (e.g. https://economy.example.com).

upstream economymanager_api {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name economy.example.com;

    # Redirect HTTP to HTTPS (optional; remove if terminating TLS elsewhere)
    # return 301 https://$host$request_uri;

    root /var/www/economymanager/frontend/dist;
    index index.html;

    # API → Node (Hono)
    location /api/ {
        proxy_pass         http:/localhost:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA: client uses relative `/api/...` — same origin is fine
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/economymanager.access.log;
    error_log  /var/log/nginx/economymanager.error.log;
}

